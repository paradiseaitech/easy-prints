<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="matte-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#0F0C20" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="100%" stop-color="#FF8F65" />
    </linearGradient>
  </defs>
  
  <!-- Main Card Body -->
  <rect width="400" height="250" fill="url(#matte-bg)" rx="16" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5" />
  
  <!-- Decorative Sleek Details -->
  <path d="M 0 100 Q 150 180 400 120 L 400 250 L 0 250 Z" fill="url(#orange-grad)" opacity="0.15" />
  <circle cx="340" cy="60" r="25" fill="url(#orange-grad)" opacity="0.8" />
  
  <!-- Content -->
  <text x="40" y="80" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" letter-spacing="1">EASY PRINTS</text>
  <text x="40" y="105" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#FF8F65" letter-spacing="2">MATTE PREMIUM FINISH</text>
  
  <rect x="40" y="150" width="80" height="4" fill="#FFFFFF" opacity="0.3" rx="2" />
  <text x="40" y="180" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">John Doe</text>
  <text x="40" y="198" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="400" fill="#9999AA">Creative Director</text>
  
  <!-- Matte Icon Indicator -->
  <rect x="300" y="190" width="60" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.1" />
  <text x="330" y="204" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle">MATTE</text>
</svg>
